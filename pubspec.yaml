name: easy_flutter_ads
description: >-
  Production-grade AdMob wrapper for Flutter: preloading with TTL and backoff,
  AdMob-policy-safe App Open ads, UMP consent, adaptive banners and
  impression-level revenue events.
version: 0.1.0
repository: https://github.com/ferdigokdemir/easy_flutter_ads
issue_tracker: https://github.com/ferdigokdemir/easy_flutter_ads/issues
topics:
  - ads
  - admob
  - monetization
  - app-open
  - consent

environment:
  sdk: ">=3.6.0 <4.0.0"
  flutter: ">=3.10.0"

dependencies:
  flutter:
    sdk: flutter
  google_mobile_ads: ">=9.0.0 <10.0.0"

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0
